<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SafeLocal.ai">
  <!-- Shield -->
  <path d="M32 3.5 56.5 12.5V31C56.5 46.8 46 57.2 32 60.5 18 57.2 7.5 46.8 7.5 31V12.5L32 3.5Z"
        fill="#FFFFFF" stroke="#0A192F" stroke-width="3.4" stroke-linejoin="round"/>

  <!-- Connector lines -->
  <g stroke="#0A192F" stroke-width="1.7" stroke-linecap="round">
    <line x1="32" y1="26" x2="32" y2="16.5"/>   <!-- up -->
    <line x1="32" y1="38" x2="32" y2="47.5"/>   <!-- down -->
    <line x1="26" y1="32" x2="16.5" y2="32"/>   <!-- left -->
    <line x1="38" y1="32" x2="47.5" y2="32"/>   <!-- right -->
    <line x1="27.6" y1="27.6" x2="21.5" y2="21.5"/> <!-- up-left -->
    <line x1="36.4" y1="27.6" x2="42.5" y2="21.5"/> <!-- up-right -->
    <line x1="27.6" y1="36.4" x2="21.5" y2="42.5"/> <!-- down-left -->
    <line x1="36.4" y1="36.4" x2="42.5" y2="42.5"/> <!-- down-right -->
  </g>

  <!-- Cardinal green nodes -->
  <g fill="#00B386">
    <circle cx="32" cy="15" r="3.3"/>
    <circle cx="32" cy="49" r="3.3"/>
    <circle cx="15" cy="32" r="3.3"/>
    <circle cx="49" cy="32" r="3.3"/>
  </g>

  <!-- Diagonal navy ring nodes -->
  <g fill="#FFFFFF" stroke="#0A192F" stroke-width="1.7">
    <circle cx="20.2" cy="20.2" r="2.7"/>
    <circle cx="43.8" cy="20.2" r="2.7"/>
    <circle cx="20.2" cy="43.8" r="2.7"/>
    <circle cx="43.8" cy="43.8" r="2.7"/>
  </g>

  <!-- Center AI chip -->
  <rect x="24" y="24" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#0A192F" stroke-width="2.2"/>
  <text x="32" y="35.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="9.5" fill="#0A192F">AI</text>
</svg>
