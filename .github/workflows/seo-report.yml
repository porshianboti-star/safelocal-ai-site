name: Daily SEO rankings report

# Runs daily and appends a dated keyword-rankings block to the Google Sheet.
# 08:00 UTC ≈ 11:00 Israel time during summer (IDT, UTC+3). In winter (IST,
# UTC+2) this fires at 10:00 local — adjust the cron at the DST change if you
# need exactly 11:00 year-round. GitHub may also delay scheduled runs under load.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: seo-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r seo-report/requirements.txt

      - name: Generate report and append to Google Sheet
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
          SEO_SHEET_ID: ${{ secrets.SEO_SHEET_ID }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
        run: python seo-report/gsc_to_sheet.py
